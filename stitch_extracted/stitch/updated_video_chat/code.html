<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "primary-container": "#ff544e",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#ff9e96",
                        "surface-variant": "#33343c",

                        "inverse-on-surface": "#2e3038",
                        "on-background": "#e2e2ec",
                        "primary": "#ffb3ac",
                        "surface-container": "#1d1f27",
                        "surface-bright": "#373941",
                        "on-primary": "#680008",
                        "on-tertiary-fixed-variant": "#004f55",
                        "on-secondary": "#680209",
                        "on-error": "#690005",
                        "outline-variant": "#5d3f3c",
                        "on-primary-container": "#5c0006",
                        "outline": "#ad8884",

                    "borderRadius": {

                        "full": "9999px"

                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]

            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-bg {
            background: radial-gradient(circle at 50% 50%, rgba(255, 59, 59, 0.1) 0%, transparent 60%),
                        radial-gradient(circle at 10% 10%, rgba(255, 59, 59, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(255, 59, 59, 0.05) 0%, transparent 40%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .liquid-glass {
            background: rgba(255, 59, 59, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 59, 59, 0.2);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden h-screen w-screen liquid-bg">
<!-- Top Navigation -->
<header class="flex justify-between items-center px-6 py-4 w-full z-50 fixed top-0 bg-white/5 backdrop-blur-[40px] border-b border-white/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#FF3B3B] text-2xl" data-icon="verified">verified</span>
<span class="text-2xl font-black text-white tracking-tighter">MeeCu</span>
</div>
<div class="px-4 py-1.5 rounded-full glass-panel flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-[#FF3B3B] animate-pulse"></span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white">Live Session</span>
</div>
</header>
<!-- Main Video Layout -->
<main class="relative h-screen w-full pt-20 pb-32 px-4 md:px-6 flex flex-col items-center">
<!-- Main Student Feed -->
<div class="relative w-full h-full glass-panel rounded-lg overflow-hidden shadow-2xl group">
<img alt="Student participant" class="w-full h-full object-cover transition-all duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsco-oNaE9aAnTUyVro0fErdzl-_oPDxkP5edZooJopYzhGb7ZbNIPrT5a5p1B5x4Tb1CxChRMR1Qh7fjRnSK-x1XyHQwOCWo6A8Q5rpCz0iU-2UqIRHmE0tKsGfD20-ckkwhgiiClKs1QO2IvuSpEe97eihZD2LwGesMydJYP6hsb1PeMKI9lvwSLrd8Z99hiD_47BgpjTfyOL0YA5CzU0YcjC91qc2ZcpeExM6nozDAb15H2FLFEbJ-fel92Jg3TKuspWzXxYDqr"/>
<!-- Student Label Overlay -->
<div class="absolute top-4 left-4 z-10">
<div class="glass-panel px-3 py-1 rounded-full flex items-center gap-2">
<span class="text-[10px] font-black uppercase tracking-widest text-white">Student</span>
</div>
</div>
<!-- Student Info Overlay (Bottom Left) -->
<div class="absolute bottom-6 left-6 z-10">
<div class="flex flex-col gap-1">
<h2 class="text-3xl font-black text-white tracking-tight leading-none mb-1">CUSATian</h2>
<div class="flex gap-2">
<span class="px-3 py-1 glass-panel rounded-full text-[9px] font-bold uppercase tracking-widest bg-white/5 border-white/10">Engineering</span>
<span class="px-3 py-1 glass-panel rounded-full text-[9px] font-bold uppercase tracking-widest bg-white/5 border-white/10">2.4km</span>
</div>
</div>
</div>
<!-- "YOU" Floating View (Top Right Inset) -->
<div class="absolute top-4 right-4 w-28 h-40 md:w-36 md:h-52 glass-panel rounded-lg overflow-hidden shadow-2xl z-20 border border-white/20 transition-transform hover:scale-105 duration-300">
<img alt="You - self preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp8-e9LXUVn4d_TAQWfSUmlgD9zQ88jn-cRq6AObDfAcIiKhN4ONgf4806EXu1AesaJpgMIgtX9H3jNUuQnuqyOTKIl0KKUvfWO4YI7sFEpzTzrrNbtM2Nr1GNaddPKkgjtAV8TnDj7MNnfFBg2VF7Toopvql66856hDMgLsGkS_yWhkjSD_iGkVsJ7Iekx5PgJQQyh_StAaVaQzrqZYFxSRNNzP94Lo_lrXPSRmEVqYrQSU2wcAEFQeLlQsrlPbT1wBNovkdk0eSY"/>
<div class="absolute bottom-2 right-2 flex items-center gap-1.5 glass-panel px-2 py-0.5 rounded-full border-white/20">
<span class="text-[8px] font-black uppercase text-white tracking-tighter">YOU</span>
</div>
</div>
</div>
<!-- Small Sleek Liquid Control Bar (Floating above main nav) -->
<div class="fixed bottom-28 left-1/2 -translate-x-1/2 z-50 w-auto px-4 py-3 liquid-glass rounded-xl flex items-center gap-4 shadow-[0_20px_40px_rgba(0,0,0,0.4)] border border-[#FF3B3B]/20">
<!-- Compact Mic/Video Toggles -->
<div class="flex items-center gap-2 pr-4 border-r border-white/10">
<button class="w-9 h-9 rounded-full glass-panel flex items-center justify-center text-gray-400 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined text-[18px]">mic_off</span>
</button>
<button class="w-9 h-9 rounded-full glass-panel flex items-center justify-center text-gray-400 hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined text-[18px]">videocam</span>
</button>
</div>
<!-- Sleek Next CTA -->
<button class="h-10 px-6 bg-[#FF3B3B] text-white rounded-full flex items-center gap-2 shadow-[0_0_20px_rgba(255,59,59,0.3)] hover:brightness-110 transition-all active:scale-95 group">
<span class="text-[10px] font-black uppercase tracking-widest">Next</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">skip_next</span>
</button>
<!-- Compact End Call -->
<button class="w-10 h-10 rounded-full flex items-center justify-center text-[#FF3B3B] bg-white/5 border border-[#FF3B3B]/30 hover:bg-[#FF3B3B] hover:text-white transition-all active:scale-90">
<span class="material-symbols-outlined text-[18px]">call_end</span>
</button>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 flex justify-around items-center z-50 w-[90%] max-w-sm bg-white/5 backdrop-blur-[40px] rounded-[3rem] px-6 py-2 border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
<!-- Video Chat (Active) -->
<a class="flex flex-col items-center justify-center text-white bg-[#FF3B3B] rounded-full w-12 h-12 shadow-[0_0_20px_rgba(255,59,59,0.5)] transition-all scale-105" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videocam</span>
</a>
<!-- Text Chat -->
<a class="flex flex-col items-center justify-center text-gray-500 w-12 h-12 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-gray-500 w-12 h-12 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
</body></html>
